name: 🔄 Sync Fork from Upstream

on:
  # Runs every Monday at 2am UTC
  schedule:
    - cron: '0 2 * * 1'
  # Allow manual run from the Actions tab
  workflow_dispatch:

jobs:
  sync:
    name: Sync upstream/main → fork/main
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout the forked repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔗 Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/villesau/ai-codereviewer.git
          git fetch upstream

      - name: 🔁 Merge upstream/main into fork/main
        run: |
          git checkout main
          git merge upstream/main --allow-unrelated-histories || echo "✅ No changes to merge"

      - name: ⬆️ Push changes back to fork
        run: |
          git push origin main
