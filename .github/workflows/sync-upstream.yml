name: 🔄 Sync Fork from Upstream

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write  # 🔑 allows pushing

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout the forked repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔗 Add upstream and fetch
        run: |
          git remote add upstream https://github.com/villesau/ai-codereviewer.git
          git fetch upstream

      - name: 🔁 Merge upstream/main into fork/main
        run: |
          git checkout main
          git merge upstream/main --allow-unrelated-histories || echo "✅ Already up to date"

      - name: ⬆️ Push changes to fork
        run: |
          git push origin main
