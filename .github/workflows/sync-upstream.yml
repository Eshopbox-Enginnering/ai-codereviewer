name: 🔄 Sync Fork from Upstream

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout the forked repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 🔗 Add upstream and fetch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/villesau/ai-codereviewer.git
          git fetch upstream
          git checkout main
          git merge upstream/main --allow-unrelated-histories || echo "✅ Already up to date"

      - name: ⬆️ Push changes to fork using PAT
        env:
          PAT_PUSH_TOKEN: ${{ secrets.PAT_PUSH_TOKEN }}
        run: |
          git remote add auth-origin https://x-access-token:${PAT_PUSH_TOKEN}@github.com/Eshopbox-Enginnering/ai-codereviewer.git
          git push auth-origin main
